<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Model Release Timeline - Crazyrouter</title>
<meta name="description" content="Interactive horizontal timeline of AI model releases from OpenAI, Anthropic, Google, Meta, DeepSeek and more.">
<link rel="canonical" href="https://crazyrouter.com/tools/model-timeline">
<meta property="og:title" content="AI Model Release Timeline - Crazyrouter">
<meta property="og:description" content="Interactive timeline tracking every major AI model release.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#ffffff;color:#1e293b}
.header{text-align:center;padding:36px 20px 12px}
.header h1{font-size:26px;color:#0f172a;font-weight:800;letter-spacing:-.5px}
.header p{color:#64748b;font-size:13px;margin-top:6px}
.toolbar{display:flex;justify-content:center;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap}
.filters{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.filters button{padding:6px 14px;border:1.5px solid #e2e8f0;border-radius:20px;background:#fff;color:#64748b;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.filters button:hover{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.filters button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.zoom{display:flex;align-items:center;gap:6px}
.zoom button{width:28px;height:28px;border-radius:6px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.zoom button:hover{border-color:#3b82f6;color:#3b82f6}
.zoom .zlabel{font-size:11px;color:#94a3b8;min-width:36px;text-align:center}
.chart-wrap{overflow-x:auto;padding:4px 20px 20px;-webkit-overflow-scrolling:touch}
.chart{position:relative}
.row{display:flex;align-items:stretch;min-height:60px;transition:background .1s}
.row:hover{background:#f8fafc}
.row:not(:last-of-type){border-bottom:1px solid #f1f5f9}
.row-label{width:120px;min-width:120px;padding:0 14px;position:sticky;left:0;background:#fff;z-index:5;display:flex;align-items:center;gap:10px;border-right:1px solid #f1f5f9;transition:background .1s}
.row:hover .row-label{background:#f8fafc}
.picon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.pname{font-size:12px;font-weight:700;color:#334155}
.row-track{position:relative;flex:1;height:60px}
.grid-line{position:absolute;top:0;bottom:0;width:1px;z-index:0}
.grid-line.gl-year{background:#e2e8f0}
.grid-line.gl-quarter{background:#f1f5f9}
.now-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:2;opacity:.6}
.now-label{position:absolute;top:-18px;font-size:9px;color:#ef4444;font-weight:700;transform:translateX(-50%);white-space:nowrap}
.series-bg{position:absolute;top:6px;height:calc(100% - 12px);border-radius:10px;opacity:.05;z-index:1}
.model{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:3;transition:transform .12s}
.model:hover{transform:translate(-50%,-50%) scale(1.25);z-index:10}
.mdot{width:22px;height:22px;border-radius:7px;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s}
.model:hover .mdot{box-shadow:0 3px 12px rgba(59,130,246,.25)}
.mlabel{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap;color:#475569;opacity:0;transition:opacity .12s;pointer-events:none;font-weight:600}
.model:hover .mlabel{opacity:1}
.type-flagship .mdot{background:#3b82f6}
.type-reasoning .mdot{background:#8b5cf6}
.type-fast .mdot{background:#10b981}
.type-open .mdot{background:#f59e0b}
.type-flagship .mdot::after{content:"⭐";font-size:9px}
.type-reasoning .mdot::after{content:"🧠";font-size:9px}
.type-fast .mdot::after{content:"⚡";font-size:9px}
.type-open .mdot::after{content:"🔓";font-size:9px}
.tooltip{position:fixed;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 20px;font-size:13px;z-index:100;pointer-events:none;opacity:0;transition:opacity .12s;max-width:300px;box-shadow:0 12px 40px rgba(0,0,0,.1)}
.tooltip.show{opacity:1}
.tooltip .tn{font-weight:800;font-size:15px;color:#0f172a}
.tooltip .tp{font-size:11px;color:#94a3b8;margin-bottom:2px}
.tooltip .td{color:#3b82f6;font-size:12px;font-weight:600;margin-bottom:6px}
.tooltip .tb{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:700;margin-bottom:6px}
.tooltip .tt{color:#64748b;font-size:12px;line-height:1.5}
.time-axis{position:relative;margin-left:120px;border-top:2px solid #e2e8f0;padding-top:8px;height:34px}
.tick{position:absolute;font-size:11px;color:#94a3b8;transform:translateX(-50%);font-weight:500}
.tick.ty{color:#334155;font-weight:800;font-size:12px}
.tick::before{content:'';position:absolute;top:-12px;left:50%;width:1px;height:6px;background:#cbd5e1}
.legend{display:flex;justify-content:center;gap:18px;padding:16px 20px;flex-wrap:wrap}
.legend span{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px;font-weight:600}
.legend .ld{width:14px;height:14px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px}
.cta{max-width:680px;margin:12px auto;padding:16px 24px;text-align:center;background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1px solid #dbeafe;border-radius:14px;font-size:13px;color:#475569}
.cta a{color:#2563eb;text-decoration:none;font-weight:700}
.footer{text-align:center;padding:20px;color:#94a3b8;font-size:12px}
.footer a{color:#94a3b8;text-decoration:none}
</style>
</head>
<body>
<div class="header">
<h1>🕐 AI Model Release Timeline</h1>
<p>Every major AI model launch — hover for details, scroll to explore</p>
</div>
<div class="toolbar">
<div class="filters" id="filters">
<button class="active" data-f="all">All Models</button>
<button data-f="flagship">⭐ Flagship</button>
<button data-f="reasoning">🧠 Reasoning</button>
<button data-f="fast">⚡ Fast</button>
<button data-f="open">🔓 Open Source</button>
</div>
<div class="zoom">
<button id="zo">−</button>
<span class="zlabel" id="zl">100%</span>
<button id="zi">+</button>
<button id="zf" style="width:auto;padding:0 10px;font-size:11px;font-weight:600">Fit</button>
</div>
</div>
<div class="chart-wrap" id="cw">
<div class="chart" id="ch"></div>
</div>
<div class="legend">
<span><span class="ld" style="background:#3b82f6">⭐</span>Flagship</span>
<span><span class="ld" style="background:#8b5cf6">🧠</span>Reasoning</span>
<span><span class="ld" style="background:#10b981">⚡</span>Fast</span>
<span><span class="ld" style="background:#f59e0b">🔓</span>Open Source</span>
</div>
<div class="cta">Access all these models through one API — <a href="https://crazyrouter.com?utm_source=tools&utm_medium=timeline&utm_campaign=model_timeline">Try Crazyrouter free →</a></div>
<div class="footer"><a href="../">← Back to Tools</a> · <a href="https://crazyrouter.com">Crazyrouter</a></div>
<div class="tooltip" id="tip"></div>

<script>
const M=[
{d:"2020-06-11",n:"GPT-3",p:"openai",s:"GPT",t:"flagship",x:"175B params. The model that started the LLM era."},
{d:"2022-11-30",n:"ChatGPT (3.5)",p:"openai",s:"GPT",t:"flagship",x:"Fine-tuned GPT-3.5. Launched ChatGPT to the public."},
{d:"2023-03-14",n:"GPT-4",p:"openai",s:"GPT",t:"flagship",x:"Multimodal model. Major leap in reasoning."},
{d:"2024-05-13",n:"GPT-4o",p:"openai",s:"GPT",t:"flagship",x:"Omni model. Native multimodal, 2x faster, 50% cheaper."},
{d:"2024-07-18",n:"GPT-4o mini",p:"openai",s:"GPT",t:"fast",x:"Small, fast, cheap. Great for high-volume tasks."},
{d:"2024-09-12",n:"o1-preview",p:"openai",s:"o-series",t:"reasoning",x:"First reasoning model. Chain-of-thought at inference."},
{d:"2025-01-30",n:"o3-mini",p:"openai",s:"o-series",t:"reasoning",x:"Smaller reasoning model. Cost-effective."},
{d:"2025-02-25",n:"GPT-4.5",p:"openai",s:"GPT",t:"flagship",x:"Largest model yet. Improved EQ and creativity."},
{d:"2025-04-14",n:"o3",p:"openai",s:"o-series",t:"reasoning",x:"Full o3 reasoning model."},
{d:"2025-04-14",n:"o4-mini",p:"openai",s:"o-series",t:"reasoning",x:"Efficient reasoning. Great cost-performance."},
{d:"2025-06-10",n:"GPT-5",p:"openai",s:"GPT",t:"flagship",x:"Unified model. PhD-level reasoning across domains."},
{d:"2025-09-09",n:"o3-pro",p:"openai",s:"o-series",t:"reasoning",x:"Enhanced o3 with more compute."},
{d:"2026-03-05",n:"GPT-5.5",p:"openai",s:"GPT",t:"flagship",x:"Next evolution. Enhanced multimodal reasoning."},
{d:"2023-03-14",n:"Claude 1",p:"anthropic",s:"Claude",t:"flagship",x:"Anthropic's first public model. Constitutional AI."},
{d:"2023-07-11",n:"Claude 2",p:"anthropic",s:"Claude",t:"flagship",x:"100K context window. Improved coding & math."},
{d:"2024-03-04",n:"Claude 3 Opus",p:"anthropic",s:"Claude 3",t:"flagship",x:"Most capable Claude 3. Topped benchmarks at launch."},
{d:"2024-03-04",n:"Claude 3 Sonnet",p:"anthropic",s:"Claude 3",t:"flagship",x:"Balanced performance and speed."},
{d:"2024-03-04",n:"Claude 3 Haiku",p:"anthropic",s:"Claude 3",t:"fast",x:"Fastest Claude 3. Near-instant responses."},
{d:"2024-06-20",n:"Claude 3.5 Sonnet",p:"anthropic",s:"Claude 3.5",t:"flagship",x:"Outperformed Claude 3 Opus at lower cost."},
{d:"2024-10-22",n:"Claude 3.5 Sonnet v2",p:"anthropic",s:"Claude 3.5",t:"flagship",x:"Updated Sonnet. Computer use capability."},
{d:"2025-02-24",n:"Claude 3.5 Haiku",p:"anthropic",s:"Claude 3.5",t:"fast",x:"Fast and cheap. Great for high-volume."},
{d:"2025-03-12",n:"Claude 3.7 Sonnet",p:"anthropic",s:"Claude 3.7",t:"reasoning",x:"Hybrid reasoning. Extended thinking mode."},
{d:"2025-04-17",n:"Claude Opus 4",p:"anthropic",s:"Claude 4",t:"flagship",x:"Best coding model at launch."},
{d:"2025-04-17",n:"Claude Sonnet 4",p:"anthropic",s:"Claude 4",t:"flagship",x:"Disciplined reasoning. Great value."},
{d:"2026-02-24",n:"Claude 3.7 Opus",p:"anthropic",s:"Claude 3.7",t:"flagship",x:"Most capable Claude to date."},
{d:"2023-02-06",n:"Bard (PaLM 2)",p:"google",s:"Gemini",t:"flagship",x:"Google's first public chatbot."},
{d:"2023-12-06",n:"Gemini 1.0",p:"google",s:"Gemini",t:"flagship",x:"Ultra, Pro, Nano. Google's multimodal flagship."},
{d:"2024-02-15",n:"Gemini 1.5 Pro",p:"google",s:"Gemini",t:"flagship",x:"1M token context window breakthrough."},
{d:"2024-12-05",n:"Gemini 2.0 Flash",p:"google",s:"Gemini",t:"fast",x:"Next-gen multimodal. Agentic capabilities."},
{d:"2025-03-04",n:"Gemini 2.5 Pro",p:"google",s:"Gemini",t:"reasoning",x:"Thinking model. Top of Chatbot Arena."},
{d:"2025-05-20",n:"Gemini 2.5 Flash",p:"google",s:"Gemini",t:"fast",x:"Fast thinking model. Great cost-performance."},
{d:"2025-12-19",n:"Gemini 2.5 Pro 0219",p:"google",s:"Gemini",t:"reasoning",x:"Updated Gemini 2.5 Pro."},
{d:"2023-02-24",n:"LLaMA",p:"meta",s:"Llama",t:"open",x:"Meta's first open-source LLM. 7B-65B."},
{d:"2023-07-18",n:"Llama 2",p:"meta",s:"Llama",t:"open",x:"Open-source. 7B-70B. Commercial license."},
{d:"2024-04-18",n:"Llama 3",p:"meta",s:"Llama",t:"open",x:"8B and 70B. State-of-art open-source."},
{d:"2024-07-23",n:"Llama 3.1 405B",p:"meta",s:"Llama",t:"open",x:"Largest open-source model. Competitive with GPT-4o."},
{d:"2024-12-09",n:"Llama 3.3 70B",p:"meta",s:"Llama",t:"open",x:"Matched 405B performance at 70B size."},
{d:"2025-04-29",n:"Llama 4 Scout",p:"meta",s:"Llama 4",t:"open",x:"17B active / 109B MoE. 10M context."},
{d:"2025-04-29",n:"Llama 4 Maverick",p:"meta",s:"Llama 4",t:"open",x:"17B active / 400B MoE."},
{d:"2024-05-07",n:"DeepSeek-V2",p:"deepseek",s:"DeepSeek",t:"open",x:"MoE architecture. 236B total, 21B active."},
{d:"2024-12-26",n:"DeepSeek-V3",p:"deepseek",s:"DeepSeek",t:"flagship",x:"671B MoE. Top open-source performance."},
{d:"2025-01-20",n:"DeepSeek-R1",p:"deepseek",s:"DeepSeek-R",t:"reasoning",x:"Open-source reasoning. MIT license. Shook the industry."},
{d:"2025-05-06",n:"DeepSeek-R2",p:"deepseek",s:"DeepSeek-R",t:"reasoning",x:"Next-gen reasoning. Improved math and code."},
{d:"2025-07-16",n:"DeepSeek-V3.5",p:"deepseek",s:"DeepSeek",t:"flagship",x:"Unified V3 + R2 capabilities."},
{d:"2026-01-23",n:"DeepSeek-R1-0120",p:"deepseek",s:"DeepSeek-R",t:"reasoning",x:"Updated R1 with improved reasoning."},
{d:"2023-09-27",n:"Mistral 7B",p:"mistral",s:"Mistral",t:"open",x:"First Mistral model. Outperformed Llama 2 13B."},
{d:"2023-12-11",n:"Mixtral 8x7B",p:"mistral",s:"Mixtral",t:"open",x:"MoE. 46.7B total, 12.9B active."},
{d:"2024-02-26",n:"Mistral Large",p:"mistral",s:"Mistral",t:"flagship",x:"Mistral's flagship commercial model."},
{d:"2024-04-17",n:"Mixtral 8x22B",p:"mistral",s:"Mixtral",t:"open",x:"Larger MoE. 176B total."},
{d:"2024-11-20",n:"Grok-2",p:"xai",s:"Grok",t:"flagship",x:"xAI's flagship. Real-time X data access."},
{d:"2025-02-19",n:"Grok-3",p:"xai",s:"Grok",t:"flagship",x:"Trained on 200K H100s. Top benchmarks."},
];

const PO=["openai","anthropic","google","meta","deepseek","mistral","xai"];
const PM={
openai:{name:"OpenAI",color:"#10a37f",icon:"🟢"},
anthropic:{name:"Anthropic",color:"#d97706",icon:"🟠"},
google:{name:"Google",color:"#4285f4",icon:"🔵"},
meta:{name:"Meta",color:"#1877f2",icon:"🔷"},
deepseek:{name:"DeepSeek",color:"#6366f1",icon:"🟣"},
mistral:{name:"Mistral",color:"#ef4444",icon:"🔴"},
xai:{name:"xAI",color:"#334155",icon:"⚫"}
};
const TC={flagship:"#3b82f6",reasoning:"#8b5cf6",fast:"#10b981",open:"#f59e0b"};
const TI={flagship:"⭐",reasoning:"🧠",fast:"⚡",open:"🔓"};

let zoom=1,filter="all";
const LW=120,BPPD=2.2;
const dates=M.map(m=>new Date(m.d+"T00:00:00Z"));
const dMin=new Date(Math.min(...dates)),dMax=new Date(Math.max(...dates));
dMin.setMonth(dMin.getMonth()-1);dMax.setMonth(dMax.getMonth()+1);
const tDays=(dMax-dMin)/864e5;
const now=new Date();
const t2026=new Date("2026-01-01T00:00:00Z");

function dOff(ds){return(new Date(ds+"T00:00:00Z")-dMin)/864e5}
function ppd(){return BPPD*zoom}

const ch=document.getElementById("ch"),cw=document.getElementById("cw"),tip=document.getElementById("tip");

function render(){
const p=ppd(),tw=tDays*p,cW=LW+tw+40;
ch.style.width=cW+"px";
const fl=filter==="all"?M:M.filter(m=>m.t===filter);
const bp={};PO.forEach(k=>bp[k]=[]);
fl.forEach(m=>{if(bp[m.p])bp[m.p].push(m)});

let h="";
const sy=dMin.getFullYear(),ey=dMax.getFullYear();
for(let y=sy;y<=ey;y++){for(let q=0;q<4;q++){
const d=new Date(Date.UTC(y,q*3,1));if(d<dMin||d>dMax)continue;
const x=LW+((d-dMin)/864e5)*p;
h+=`<div class="grid-line ${q===0?"gl-year":"gl-quarter"}" style="left:${x}px"></div>`;
}}

// Now line
if(now>=dMin&&now<=dMax){
const nx=LW+((now-dMin)/864e5)*p;
h+=`<div class="now-line" style="left:${nx}px"><span class="now-label" style="left:0">TODAY</span></div>`;
}

PO.forEach(prov=>{
const items=bp[prov],pm=PM[prov];
h+=`<div class="row"><div class="row-label"><span class="picon" style="font-size:18px">${pm.icon}</span><span class="pname">${pm.name}</span></div><div class="row-track">`;
const bs={};items.forEach(m=>{if(!bs[m.s])bs[m.s]=[];bs[m.s].push(m)});
Object.values(bs).forEach(g=>{if(g.length<2)return;const xs=g.map(m=>dOff(m.d)*p);const mn=Math.min(...xs)-14,mx=Math.max(...xs)+14;
h+=`<div class="series-bg" style="left:${mn}px;width:${mx-mn}px;background:${pm.color}"></div>`;});
items.forEach(m=>{const x=dOff(m.d)*p;
h+=`<div class="model type-${m.t}" style="left:${x}px" data-m='${JSON.stringify(m).replace(/'/g,"&#39;")}'>`;
h+=`<div class="mdot"></div><div class="mlabel">${m.n}</div></div>`;});
h+=`</div></div>`;
});

h+=`<div class="time-axis" style="width:${tw+40}px">`;
for(let y=sy;y<=ey;y++){for(let q=0;q<4;q++){
const d=new Date(Date.UTC(y,q*3,1));if(d<dMin||d>dMax)continue;
const x=((d-dMin)/864e5)*p;
h+=`<div class="tick${q===0?" ty":""}" style="left:${x}px">${q===0?y:"Q"+(q+1)}</div>`;
}}
h+=`</div>`;
ch.innerHTML=h;

ch.querySelectorAll(".model").forEach(el=>{
el.addEventListener("mouseenter",()=>{
const m=JSON.parse(el.dataset.m),dt=new Date(m.d+"T00:00:00"),ds=dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const tc=TC[m.t]||"#64748b",pm=PM[m.p];
tip.innerHTML=`<div class="tn">${m.n}</div><div class="tp">${pm.name} · ${m.s}</div><div class="td">${ds}</div><span class="tb" style="background:${tc}">${TI[m.t]||""} ${m.t}</span><div class="tt">${m.x}</div>`;
tip.classList.add("show");
});
el.addEventListener("mousemove",e=>{let x=e.clientX+14,y=e.clientY-10;if(x+310>innerWidth)x=e.clientX-310;if(y+130>innerHeight)y=e.clientY-130;tip.style.left=x+"px";tip.style.top=y+"px"});
el.addEventListener("mouseleave",()=>tip.classList.remove("show"));
});
}

function scrollCenter(){
const p=ppd();
const tx=LW+((t2026-dMin)/864e5)*p;
cw.scrollLeft=tx-cw.clientWidth/2;
}

document.querySelectorAll(".filters button").forEach(b=>{b.addEventListener("click",()=>{
document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");filter=b.dataset.f;render();scrollCenter();
})});

document.getElementById("zi").addEventListener("click",()=>{zoom=Math.min(zoom*1.3,5);document.getElementById("zl").textContent=Math.round(zoom*100)+"%";render();scrollCenter()});
document.getElementById("zo").addEventListener("click",()=>{zoom=Math.max(zoom/1.3,.3);document.getElementById("zl").textContent=Math.round(zoom*100)+"%";render();scrollCenter()});
document.getElementById("zf").addEventListener("click",()=>{const a=cw.clientWidth-LW-60;zoom=Math.max(.3,Math.min(a/(tDays*BPPD),5));document.getElementById("zl").textContent=Math.round(zoom*100)+"%";render();scrollCenter()});

render();
requestAnimationFrame(scrollCenter);
</script>
</body>
</html>
